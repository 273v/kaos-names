# Pre-commit hooks for kaos-names.
#
# Install:
#   uvx pre-commit install
#
# Run on every commit or manually on the whole tree:
#   uvx pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^LICENSE$
      - id: end-of-file-fixer
        exclude: ^LICENSE$
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-format
        files: ^(kaos_names|tests)/.*\.py$
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
        files: ^(kaos_names|tests)/.*\.py$

  - repo: local
    hooks:
      - id: ty
        name: ty check
        entry: uv run ty check kaos_names tests
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
