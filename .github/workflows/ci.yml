name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --group dev --python 3.13

      - name: Ruff format check
        run: uv run ruff format --check kaos_names tests

      - name: Ruff lint
        run: uv run ruff check kaos_names tests

      - name: Type check
        run: uv run ty check kaos_names tests

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.13"
            experimental: false
          - python-version: "3.14"
            experimental: false
          - python-version: "3.14t"
            experimental: true
          - python-version: "3.15"
            experimental: true
    continue-on-error: ${{ matrix.experimental }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install --preview ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev --python ${{ matrix.python-version }}

      - name: Run tests
        run: |
          uv run pytest \
            -m "not live and not network and not slow" \
            --cov=kaos_names \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage report
        if: always() && !matrix.experimental
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 14

  min-deps:
    name: Test against minimum dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install with lowest-direct resolution
        run: uv sync --group dev --resolution=lowest-direct --python 3.13

      - name: Run tests
        run: uv run pytest -m "not live and not network and not slow" --no-cov -q

  build:
    name: Build distribution and smoke test
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Build wheel and sdist
        run: uv build

      - name: Verify metadata
        run: uvx --from twine twine check --strict dist/*

      - name: Smoke-test the built wheel in a clean venv
        run: |
          uv venv --python 3.13 /tmp/smoke
          uv pip install --python /tmp/smoke/bin/python dist/kaos_names-*-py3-none-any.whl
          /tmp/smoke/bin/python -c "
          import re
          import kaos_names
          name = kaos_names.generate_name()
          assert kaos_names.__version__
          assert re.fullmatch(r'[a-z]+-[a-z]+-[0-9]{2}', name)
          print(f'kaos-names {kaos_names.__version__}: {name}')
          "
          /tmp/smoke/bin/kaos-names generate --seed 273

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7
