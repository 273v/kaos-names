name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distribution
    runs-on: kaos-x64-16core
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --group dev --python 3.13

      - name: Verify version matches tag
        id: version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=$(uv run python -c "from kaos_names._version import __version__; print(__version__)")
          TAG=${GITHUB_REF_NAME#v}
          if [ "$VERSION" != "$TAG" ]; then
            echo "::error::Tag '$TAG' does not match _version.py value '$VERSION'"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Pre-publish QA
        run: |
          uv run ruff format --check kaos_names tests
          uv run ruff check kaos_names tests
          uv run ty check kaos_names tests
          uv run pytest -m "not live and not network and not slow" --no-cov

      - name: Build wheel and sdist
        run: uv build

      - name: Verify metadata
        run: uvx --from twine twine check --strict dist/*

      - name: Smoke-test the built wheel in a clean venv
        run: |
          uv venv --python 3.13 /tmp/smoke
          uv pip install --python /tmp/smoke/bin/python dist/kaos_names-*-py3-none-any.whl
          /tmp/smoke/bin/python -c "
          import re
          import kaos_names
          name = kaos_names.generate_name()
          assert re.fullmatch(r'[a-z]+-[a-z]+-[0-9]{2}', name)
          print(f'kaos-names {kaos_names.__version__}: {name}')
          "

      # ── F8: CycloneDX SBOM generation (kaos-compliance audit) ──
      # SBOMs were previously trapped in workflow artifact storage (30-day
      # expiry). We now ship them as GitHub Release assets so third parties
      # can fetch the exact SBOM via `gh release download` or `curl`. PyPI's
      # upload contract rejects non-wheel/non-sdist filetypes (twine's
      # DIST_EXTENSIONS = {.whl, .tar.gz, .zip}), so the SBOM lives in
      # `sbom/` — NOT `dist/` — and ships only on the GitHub Release;
      # the Trusted Publisher PyPI upload is untouched.
      #
      # audit-04 F-001: generate the SBOM from a clean runtime-only
      # install of the built wheel, NOT from `.venv` (which carries the
      # dev group: pytest, ruff, ty, coverage, …). The previous SBOM
      # listed those tools as components, falsely telling consumers
      # that this zero-dependency leaf package depended on test/type/
      # lint tooling. Re-use the `/tmp/smoke` venv from the smoke-test
      # step (built one step above by `uv pip install <wheel>` with no
      # dev deps) so the SBOM matches what `pip install kaos-names`
      # actually pulls.
      - name: Generate CycloneDX SBOM (F8)
        run: |
          set -euo pipefail
          mkdir -p sbom
          # Resolve package version from the built sdist; works for both
          # tag-triggered runs and workflow_dispatch dry-runs.
          SDIST=$(ls dist/*.tar.gz | head -1)
          PKG_VERSION=$(basename "$SDIST" .tar.gz | awk -F- '{print $NF}')
          PKG_NAME="kaos-names"
          SBOM_FILE="sbom/${PKG_NAME}-${PKG_VERSION}.cdx.json"
          # Pinned cyclonedx-bom (PyPA-blessed CycloneDX tooling for Python).
          # `cyclonedx-py environment` enumerates everything pip resolved
          # in the target venv. By pointing at `/tmp/smoke` (the clean
          # runtime venv built one step above) we report only what a
          # real `pip install kaos-names` user would see — not the dev
          # group's test/type/lint tooling.
          uvx --from cyclonedx-bom==7.3.0 cyclonedx-py environment /tmp/smoke \
            --pyproject pyproject.toml \
            --mc-type library \
            --of JSON \
            --output-reproducible \
            --validate \
            -o "${SBOM_FILE}"
          ls -la sbom/
          # Runtime-honesty assertion (audit-04 F-001): a zero-dep
          # package (`dependencies = []` in pyproject.toml) must produce
          # an SBOM whose `components` array does NOT carry test/type/
          # lint tooling. Only the package itself plus pip install
          # plumbing (pip/setuptools/wheel) is allowed. The prior
          # `.venv`-based SBOM had 9 dev-group components.
          uv run python -c "
          import json, sys
          d = json.load(open('${SBOM_FILE}'))
          comps = d.get('components', [])
          n = len(comps)
          if n == 0:
              print('ERROR: SBOM has 0 components', file=sys.stderr)
              sys.exit(1)
          ALLOWED = {'pip', 'setuptools', 'wheel', 'kaos-names'}
          leaks = [c.get('name') for c in comps if c.get('name') not in ALLOWED]
          if leaks:
              print(f'ERROR: SBOM leaks dev-only components: {leaks}', file=sys.stderr)
              print('Expected only install plumbing (pip/setuptools/wheel) + the package itself.', file=sys.stderr)
              print('See audit-04/kaos-names.md F-001.', file=sys.stderr)
              sys.exit(1)
          print(f'SBOM OK: {n} components ({[c.get(\"name\") for c in comps]}), specVersion={d.get(\"specVersion\")}, file=${SBOM_FILE}')
          "

      - name: Upload SBOM artifact (F8)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom
          path: sbom/
          retention-days: 30

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: dist/
          retention-days: 30

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: kaos-x64-16core
    environment:
      name: pypi
      url: https://pypi.org/p/kaos-names
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          attestations: true
          skip-existing: false

  github-release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: kaos-x64-16core
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/

      - name: Download SBOM artifact (F8)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sbom
          path: sbom/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          PRERELEASE_FLAG=""
          if [[ "$VERSION" == *a* || "$VERSION" == *b* || "$VERSION" == *rc* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$GITHUB_REF_NAME" \
            --title "kaos-names $VERSION" \
            --notes-from-tag \
            $PRERELEASE_FLAG \
            dist/* \
            sbom/*
