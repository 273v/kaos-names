name: build

# Standard `build` lane (per
# kaos-modules/docs/oss/40-ci-cd/runner-cost-reduction-plan.md):
# build wheel/sdist, `twine check --strict`, clean-venv smoke install.
# Linux Python 3.13 on PR / main push / tag. The release workflow
# (release.yml) is the gated artifact-publish path; this lane is the
# PR-time smoke that the artifact builds cleanly and the wheel
# installs.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: build
    runs-on: kaos-x64-16core
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Build wheel and sdist
        run: uv build

      - name: Verify metadata
        run: uvx --from twine twine check --strict dist/*

      - name: Smoke-test the built wheel in a clean venv
        run: |
          uv venv --python 3.13 /tmp/smoke
          uv pip install --python /tmp/smoke/bin/python dist/kaos_names-*-py3-none-any.whl
          /tmp/smoke/bin/python -c "
          import re
          import kaos_names
          name = kaos_names.generate_name()
          assert kaos_names.__version__
          assert re.fullmatch(r'[a-z]+-[a-z]+-[0-9]{2}', name)
          print(f'kaos-names {kaos_names.__version__}: {name}')
          "
          /tmp/smoke/bin/kaos-names generate --seed 273

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7
